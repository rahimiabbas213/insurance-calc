<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>محاسبه بیمه شخص ثالث</title>

<style>
body{
font-family:tahoma;
background:#f2f2f2;
text-align:center;
direction:rtl;
}

.container{
background:white;
padding:30px;
max-width:500px;
margin:auto;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
color:#2c3e50;
}

select,input{
width:90%;
padding:10px;
margin:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#219150;
}

.result{
font-size:20px;
margin-top:15px;
color:#e74c3c;
}

.footer{
margin-top:25px;
font-size:12px;
color:#666;
}
</style>

</head>

<body>

<div class="container">

<h2>استعلام قیمت بیمه شخص ثالث</h2>

<select id="car">
<option value="4000000">پراید</option>
<option value="4200000">تیبا</option>
<option value="4500000">کوییک</option>
<option value="4700000">ساینا</option>
<option value="5000000">پژو 405</option>
<option value="5200000">پژو پارس</option>
<option value="5200000">سمند</option>
<option value="5400000">دنا</option>
<option value="5600000">دنا پلاس</option>
<option value="6000000">شاهین</option>
<option value="6500000">هایما</option>
<option value="7000000">جک</option>
<option value="7500000">لیفان</option>
<option value="8000000">چری</option>
<option value="9000000">مزدا</option>
</select>

<input type="number" id="discount" placeholder="درصد تخفیف (مثلاً 30)">

<input type="number" id="damage" placeholder="تعداد خسارت در سال گذشته">

<input type="number" id="year" placeholder="سال ساخت خودرو (مثلاً 1398)">

<input type="text" id="phone" placeholder="شماره موبایل برای دریافت مشاوره">

<button onclick="calc()">محاسبه قیمت</button>

<div class="result" id="price"></div>

<br>

<button onclick="sendToAzki()">مشاهده قیمت نهایی در ازکی</button>

<div class="footer">
قیمت نمایش داده شده تقریبی است و ممکن است با نرخ نهایی شرکت‌های بیمه متفاوت باشد.<br>
نماینده فروش: عباس رحیمی
</div>

</div>

<script>

function calc(){

let car = parseInt(document.getElementById("car").value)
let discount = parseInt(document.getElementById("discount").value) || 0
let damage = parseInt(document.getElementById("damage").value) || 0
let year = parseInt(document.getElementById("year").value) || 1400

let currentYear = 1405
let age = currentYear - year

let price = car

price = price - (price * discount / 100)

price = price + (damage * 500000)

price = price + (age * 100000)

price = Math.round(price)

document.getElementById("price").innerHTML =
"قیمت تقریبی: " + price.toLocaleString() + " تومان"

saveLead()

}

function saveLead(){

let phone = document.getElementById("phone").value

if(phone.length > 0){

let leads = JSON.parse(localStorage.getItem("leads")) || []

leads.push({
phone:phone,
date:new Date().toLocaleString()
})

localStorage.setItem("leads",JSON.stringify(leads))

}

}

function sendToAzki(){

window.open("https://zil.ink/abbas-rahimi")

}

</script>

</body>
</html>
