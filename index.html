<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>محاسبه آنلاین بیمه شخص ثالث</title>
</head>
<body style="font-family:tahoma;direction:rtl;padding:20px">

<h2>محاسبه آنلاین قیمت بیمه شخص ثالث 🚗</h2>

<label>نوع خودرو:</label>
<select id="car">
<option value="pride">پراید</option>
<option value="peugeot">پژو</option>
<option value="samand">سمند</option>
</select>

<br><br>

<label>درصد تخفیف:</label>
<input type="number" id="discount">

<br><br>

<label>تعداد خسارت:</label>
<input type="number" id="accident">

<br><br>

<button onclick="calc()">محاسبه</button>

<h3 id="result"></h3>

<script>
function calc(){

const car=document.getElementById("car").value;
const discount=Number(document.getElementById("discount").value);
const accident=Number(document.getElementById("accident").value);

const base=5000000;

const multi={
pride:1,
peugeot:1.2,
samand:1.3
};

let price=base*multi[car];

price-=price*(discount/100);
price+=accident*500000;

document.getElementById("result").innerText=
"قیمت تقریبی: "+price.toLocaleString()+" تومان";

}
</script>

</body>
</html>
